name: Deploy

on:
  push:
    branches: [main]

env:
  DOTNET_VERSION: "10.0.x"
  AZURE_WEBAPP_NAME: "devops-mvc-app"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore src/DevopsMvcApp/DevopsMvcApp.csproj

      - name: Build
        run: dotnet build src/DevopsMvcApp/DevopsMvcApp.csproj --no-restore -c Release

      - name: Publish
        run: dotnet publish src/DevopsMvcApp/DevopsMvcApp.csproj -c Release -o ./publish

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
