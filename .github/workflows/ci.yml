name: CI Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore src/DevopsMvcApp/DevopsMvcApp.csproj

      - name: Build
        run: dotnet build src/DevopsMvcApp/DevopsMvcApp.csproj --no-restore -c Release

      - name: Run EF migrations
        run: |
          dotnet tool install --global dotnet-ef
          dotnet ef database update --project src/DevopsMvcApp/DevopsMvcApp.csproj

      - name: Test
        run: dotnet test src/DevopsMvcApp/DevopsMvcApp.csproj --no-build -c Release --verbosity normal
